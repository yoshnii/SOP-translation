<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOP 自动翻译</title>
<style>
  :root {
    --bg: #fbfbfd;
    --card: #ffffff;
    --ink: #1d1d1f;
    --ink2: #6e6e73;
    --line: #e8e8ed;
    --blue: #0071e3;
    --blue-dark: #0058b8;
    --amber: #bf7e00;
    --green: #1d8a4e;
    --red: #d70015;
    --radius: 18px;
    --shadow: 0 4px 24px rgba(0,0,0,.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: -apple-system, "SF Pro Display", "SF Pro Text", "Helvetica Neue",
                 "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--ink);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 0 22px 80px; }

  /* 顶部:无色块,纯留白居中 */
  .hero { text-align: center; padding: 72px 0 44px; }
  .hero h1 {
    margin: 0; font-size: 34px; font-weight: 600; letter-spacing: -0.5px;
    color: var(--ink);
  }
  .hero .sub { margin: 14px 0 0; font-size: 18px; color: var(--ink2); font-weight: 400; }
  .hero .by { margin: 22px 0 0; font-size: 13px; color: var(--ink2); }
  .hero .by a { color: var(--blue); text-decoration: none; }
  .hero .by a:hover { text-decoration: underline; }

  /* 卡片 */
  .card {
    background: var(--card); border-radius: var(--radius); padding: 30px;
    margin-bottom: 22px; box-shadow: var(--shadow); border: 1px solid var(--line);
  }
  .card h2 {
    margin: 0 0 20px; font-size: 19px; font-weight: 600; letter-spacing: -0.2px;
    display: flex; align-items: center; gap: 10px;
  }
  .step { width: 24px; height: 24px; border-radius: 50%; background: var(--ink);
          color: #fff; font-size: 13px; font-weight: 600; display: inline-flex;
          align-items: center; justify-content: center; flex-shrink: 0; }

  /* 按钮(苹果风:圆角胶囊、克制蓝) */
  .btn {
    background: var(--blue); color: #fff; border: 0; border-radius: 980px;
    padding: 11px 24px; font-size: 15px; font-weight: 500; cursor: pointer;
    transition: background .2s; font-family: inherit;
  }
  .btn:hover { background: var(--blue-dark); }
  .btn:disabled { background: #aebfd4; cursor: not-allowed; }
  .btn.ghost { background: transparent; color: var(--blue); border: 1px solid #c8d4e6; }
  .btn.ghost:hover { background: #f0f6ff; }

  /* 上传区:无框,极简 */
  .pick-wrap { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .pick-wrap input[type=file] { display: none; }
  .hint { color: var(--ink2); font-size: 14px; }

  /* key 区 */
  .keybox { margin-top: 22px; padding-top: 20px; border-top: 1px solid var(--line); }
  .keylabel { font-size: 14px; color: var(--ink); cursor: pointer; user-select: none;
              display: inline-flex; align-items: center; gap: 8px; }
  .keyinput { width: 100%; margin-top: 12px; padding: 11px 14px; border: 1px solid var(--line);
              border-radius: 12px; font-size: 14px; font-family: inherit; background: #fafafc; }
  .keyinput:focus { outline: none; border-color: var(--blue); }
  .keyhint { color: var(--ink2); font-size: 13px; margin: 10px 0 0; }

  /* 统计格子 */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr)); gap: 14px; }
  .stat { background: #f5f5f7; border-radius: 14px; padding: 16px; text-align: center; }
  .stat .v { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; }
  .stat .l { font-size: 12px; color: var(--ink2); margin-top: 4px; }
  .cost { background: #fff8ec; border: 1px solid #f3e2bf; border-radius: 14px;
          padding: 16px 18px; font-size: 15px; color: var(--ink); }
  .cost b { color: var(--amber); font-size: 22px; font-weight: 600; }

  /* 进度条 */
  .bar { height: 8px; background: #e9e9ee; border-radius: 99px; overflow: hidden; }
  .bar > div { height: 100%; background: var(--blue); width: 0; transition: width .3s; border-radius: 99px; }

  .row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .muted { color: var(--ink2); font-size: 14px; }
  .err { color: var(--red); }
  .ok { color: var(--green); }
  .hide { display: none; }

  /* 预览 */
  .preview { max-height: 380px; overflow: auto; border: 1px solid var(--line);
             border-radius: 14px; padding: 18px; font-size: 14px; line-height: 1.7; background: #fafafc; }
  .preview p { margin: 0 0 8px; }

  /* 术语表 */
  .tabs { display: inline-flex; background: #f0f0f3; border-radius: 980px; padding: 3px; margin-bottom: 18px; }
  .tabs button { border: 0; background: none; padding: 8px 20px; font-size: 14px; font-weight: 500;
                 border-radius: 980px; cursor: pointer; color: var(--ink2); font-family: inherit; }
  .tabs button.active { background: #fff; color: var(--ink); box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .search { width: 100%; padding: 11px 16px; border: 1px solid var(--line); border-radius: 12px;
            font-size: 14px; margin-bottom: 14px; font-family: inherit; background: #fafafc; }
  .search:focus { outline: none; border-color: var(--blue); }
  .gloss-box { max-height: 420px; overflow: auto; border: 1px solid var(--line); border-radius: 14px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 11px 16px; border-bottom: 1px solid var(--line); }
  th { background: #fafafc; position: sticky; top: 0; font-weight: 600; color: var(--ink2); font-size: 13px; }
  tr:last-child td { border-bottom: 0; }

  /* 添加术语 */
  .addbox { margin-top: 18px; padding: 18px; background: #f5f5f7; border-radius: 14px; }
  .addbox .frow { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .addbox input, .addbox select {
    padding: 9px 12px; border: 1px solid var(--line); border-radius: 10px; font-size: 14px;
    font-family: inherit; background: #fff;
  }
  .addbox input:focus, .addbox select:focus { outline: none; border-color: var(--blue); }
  .addbox .msg { margin-top: 10px; font-size: 13px; }

  /* 右下角消耗提示 */
  .toast { position: fixed; right: 24px; bottom: 24px; width: 272px; z-index: 999;
           background: #fff; border: 1px solid var(--line); border-radius: 16px;
           box-shadow: 0 8px 30px rgba(0,0,0,.14); padding: 16px 18px;
           transform: translateY(20px); opacity: 0; transition: .28s; pointer-events: none; }
  .toast.show { transform: translateY(0); opacity: 1; pointer-events: auto; }
  .toast .x { position: absolute; top: 10px; right: 14px; cursor: pointer; color: #c0c0c8;
              font-size: 20px; line-height: 1; border: 0; background: none; }
  .toast .x:hover { color: var(--ink2); }
  .toast .t-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
  .toast .t-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--ink2); margin: 4px 0; }
  .toast .t-cost { font-size: 20px; font-weight: 600; color: var(--amber); margin-top: 8px; }

  .footer { text-align: center; color: var(--ink2); font-size: 12px; padding: 40px 0 0; }
</style>
</head>
<body>

<div class="wrap">

  <!-- 顶部:留白居中,无色块 -->
  <div class="hero">
    <h1>SOP 自动翻译</h1>
    <p class="sub">解决方案中心 · 应用开发组 · 中文 → 英文</p>
    <p class="sub" style="font-size:15px;margin-top:8px">完整保留图片、排版、表格、目录、页眉页脚 · 由 DeepSeek V4 Pro 驱动</p>
    <p class="by">由 <b>丁善（BGI40286）</b> 创建 ·
      <a href="https://github.com/yoshnii/SOP-translation" target="_blank" rel="noopener">GitHub</a>
    </p>
  </div>

  <!-- 上传 -->
  <div class="card">
    <h2><span class="step">1</span>上传文档</h2>
    <div class="pick-wrap">
      <label class="btn" for="file">选择 .docx 文件</label>
      <input type="file" id="file" accept=".docx">
      <span class="hint" id="dropText">或将文件拖到此处</span>
    </div>
    <div class="keybox">
      <label class="keylabel"><input type="checkbox" id="useOwnKey"> 用自己的 API Key（商业 AI 接口）</label>
      <input type="password" id="ownKey" class="keyinput hide" placeholder="ark-... 你的 API Key（只在本次翻译用，不保存）" autocomplete="off">
      <p class="keyhint" id="keyHint">默认用作者的 API Key（商业 AI 接口）。</p>
    </div>
  </div>

  <!-- 分析 -->
  <div class="card hide" id="statCard">
    <h2><span class="step">2</span>文档分析</h2>
    <div class="stats" id="stats"></div>
    <div class="cost" id="cost" style="margin-top:16px"></div>
    <div style="margin-top:20px" class="row">
      <button class="btn" id="startBtn">开始翻译</button>
      <span class="muted" id="fileLabel"></span>
    </div>
  </div>

  <!-- 进度 -->
  <div class="card hide" id="progCard">
    <h2><span class="step">3</span>翻译中</h2>
    <div class="bar"><div id="barFill"></div></div>
    <p class="muted" id="progText" style="margin-top:14px">准备中…</p>
  </div>

  <!-- 结果 -->
  <div class="card hide" id="resultCard">
    <h2><span class="step">4</span>完成</h2>
    <div class="cost" id="finalCost"></div>
    <div class="stats" id="finalStats" style="margin-top:16px"></div>
    <div style="margin-top:20px" class="row">
      <button class="btn" id="downloadBtn">下载译文</button>
      <button class="btn ghost" id="previewBtn">在线预览</button>
      <button class="btn ghost" id="resetBtn">翻译新文档</button>
    </div>
    <div class="preview hide" id="preview" style="margin-top:18px"></div>
  </div>

  <!-- 术语表 -->
  <div class="card">
    <h2>术语表</h2>
    <div class="tabs">
      <button class="active" data-genre="sci" id="tabSci">科学 / 技术</button>
      <button data-genre="siro" id="tabSiro">SIRO 产品专有</button>
    </div>
    <input class="search" id="glossSearch" placeholder="搜索中文 / 英文术语…">
    <div class="gloss-box">
      <table>
        <thead><tr><th style="width:40%">中文</th><th>英文</th></tr></thead>
        <tbody id="glossBody"></tbody>
      </table>
    </div>

    <!-- 添加术语 -->
    <div class="addbox">
      <div class="frow">
        <input id="addZh" placeholder="中文" style="width:130px">
        <input id="addEn" placeholder="英文" style="width:160px">
        <select id="addGenre">
          <option value="sci">科学 / 技术</option>
          <option value="siro">SIRO 产品专有</option>
        </select>
        <input id="addPw" type="password" placeholder="密码" style="width:90px">
        <button class="btn" id="addBtn" style="padding:9px 20px">添加</button>
      </div>
      <div class="msg" id="addMsg"></div>
    </div>
  </div>

  <div class="footer">解决方案中心 · 应用开发组 · SOP 自动翻译</div>

</div>

<!-- 右下角消耗提示 -->
<div class="toast" id="toast">
  <button class="x" id="toastX" title="关闭">×</button>
  <div class="t-title">本次翻译消耗</div>
  <div class="t-row">输入字符 <b id="tIn">—</b></div>
  <div class="t-row">输出字符 <b id="tOut">—</b></div>
  <div class="t-cost" id="tCost">￥—</div>
</div>

<script src="config.js" onerror="void 0"></script>
<script>
let JOB = null, pollTimer = null, GLOSS = [], curGenre = 'sci';

const $ = id => document.getElementById(id);
const show = (id, on=true) => $(id).classList.toggle('hide', !on);
const API_BASE = (window.API_BASE || "").replace(/\/$/, "");
const api = (p) => API_BASE + p;
function fmt(n){ return (n==null)?'—':n.toLocaleString(); }
function escapeHtml(s){ return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

// ---- 上传 ----
const fileInput = $('file');
fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });
// 拖拽
document.body.addEventListener('dragover', e => e.preventDefault());
document.body.addEventListener('drop', e => {
  e.preventDefault();
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});

async function handleFile(file) {
  if (!file.name.toLowerCase().endsWith('.docx')) { alert('只支持 .docx 文件'); return; }
  $('dropText').textContent = '上传中：' + file.name;
  const fd = new FormData(); fd.append('file', file);
  const r = await fetch(api('/api/upload'), { method:'POST', body: fd });
  if (!r.ok) { const e = await r.json(); alert('上传失败：' + (e.detail||r.status)); $('dropText').textContent='或将文件拖到此处'; return; }
  JOB = await r.json();
  renderStats();
}

function renderStats() {
  show('statCard', true);
  $('fileLabel').textContent = JOB.filename;
  $('stats').innerHTML = `
    <div class="stat"><div class="v">${fmt(JOB.total_segments)}</div><div class="l">总段落</div></div>
    <div class="stat"><div class="v">${fmt(JOB.unique_segments)}</div><div class="l">去重待翻</div></div>
    <div class="stat"><div class="v">${fmt(JOB.images)}</div><div class="l">图片</div></div>
    <div class="stat"><div class="v">${fmt(JOB.in_chars)}</div><div class="l">中文字符</div></div>`;
  $('cost').innerHTML = `预估费用 <b>￥${JOB.cost_est}</b> <span class="muted">（DeepSeek V4 Pro 章节级翻译，按 token 计费）</span>`;
  $('statCard').scrollIntoView({behavior:'smooth'});
}

// ---- key 开关 ----
$('useOwnKey').addEventListener('change', e => {
  show('ownKey', e.target.checked);
  $('keyHint').textContent = e.target.checked
    ? '已选择用你自己的 API Key —— 费用走你自己的账户。'
    : '默认用作者的 API Key（商业 AI 接口）。';
});

// ---- 开始翻译 ----
$('startBtn').addEventListener('click', async () => {
  const useOwn = $('useOwnKey').checked, ownKey = $('ownKey').value.trim();
  if (useOwn && !ownKey) { alert('勾选了用自己的 Key，请填入或取消勾选。'); return; }
  $('startBtn').disabled = true;
  const r = await fetch(api('/api/translate/' + JOB.job_id), {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(useOwn ? {api_key: ownKey} : {})
  });
  if (!r.ok) { const e = await r.json(); alert('启动失败：'+(e.detail||r.status)); $('startBtn').disabled=false; return; }
  show('progCard', true);
  $('progCard').scrollIntoView({behavior:'smooth'});
  pollTimer = setInterval(poll, 1000);
});

async function poll() {
  const s = await (await fetch(api('/api/status/' + JOB.job_id))).json();
  if (s.status === 'running') {
    const pct = Math.min(99, s.percent);  // 收尾前不显示100,避免误以为完成
    $('barFill').style.width = pct + '%';
    if (s.done >= s.total && s.total > 0) {
      $('progText').textContent = '正在收尾（补翻残留、保存格式）…';
    } else {
      $('progText').textContent = `已翻译 ${s.done} / ${s.total}（${s.percent}%）`;
    }
  } else if (s.status === 'done') {
    clearInterval(pollTimer);
    $('barFill').style.width = '100%'; $('progText').textContent = '完成！';
    JOB = s; renderResult();
  } else if (s.status === 'error') {
    clearInterval(pollTimer);
    $('progText').innerHTML = '<span class="err">出错：' + (s.error||'') + '</span>';
  }
}

function renderResult() {
  show('resultCard', true);
  $('finalCost').innerHTML = `本次翻译消耗约 <b>￥${JOB.cost}</b>`
    + (JOB.own_key ? '（走你自己的 Key）' : '');
  const resid = JOB.residual_zh;
  const residHtml = resid > 0
    ? `<div class="stat"><div class="v err">${resid}</div><div class="l">残留中文段</div></div>`
    : `<div class="stat"><div class="v ok">0</div><div class="l">无残留中文</div></div>`;
  $('finalStats').innerHTML = `
    <div class="stat"><div class="v">${fmt(JOB.in_chars)}</div><div class="l">输入字符</div></div>
    <div class="stat"><div class="v">${fmt(JOB.out_chars)}</div><div class="l">输出字符</div></div>
    <div class="stat"><div class="v">${fmt(JOB.images)}</div><div class="l">图片保留</div></div>
    ${residHtml}`;
  $('resultCard').scrollIntoView({behavior:'smooth'});
  showCostToast();
  // 翻译完成自动下载译文(无需手动点;若浏览器拦截,可手动点"下载译文")
  setTimeout(() => { window.location = api('/api/download/' + JOB.job_id); }, 600);
}

$('downloadBtn').addEventListener('click', () => { window.location = api('/api/download/' + JOB.job_id); });
$('previewBtn').addEventListener('click', async () => {
  const d = await (await fetch(api('/api/preview/' + JOB.job_id))).json();
  $('preview').innerHTML = d.paragraphs.map(p => '<p>' + escapeHtml(p) + '</p>').join('')
    + (d.total > d.paragraphs.length ? `<p class="muted">…仅预览前 ${d.paragraphs.length} 段，共 ${d.total} 段，完整内容请下载</p>` : '');
  show('preview', true);
});
$('resetBtn').addEventListener('click', () => location.reload());

// ---- 消耗 toast ----
let toastTimer = null;
function showCostToast() {
  $('tIn').textContent = fmt(JOB.in_chars);
  $('tOut').textContent = fmt(JOB.out_chars);
  $('tCost').textContent = '￥' + JOB.cost;
  $('toast').classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(hideToast, 8000);
}
function hideToast(){ $('toast').classList.remove('show'); clearTimeout(toastTimer); }
$('toastX').addEventListener('click', e => { e.stopPropagation(); hideToast(); });
document.addEventListener('click', e => {
  const t = $('toast');
  if (t.classList.contains('show') && !t.contains(e.target)) hideToast();
});

// ---- 术语表 ----
async function loadGlossary() {
  const d = await (await fetch(api('/api/glossary'))).json();
  GLOSS = d.items;
  renderGloss();
}
function renderGloss() {
  const q = $('glossSearch').value.trim().toLowerCase();
  const rows = GLOSS.filter(it => it.genre === curGenre)
    .filter(it => !q || it.zh.toLowerCase().includes(q) || it.en.toLowerCase().includes(q));
  $('glossBody').innerHTML = rows.map(it =>
    `<tr><td>${escapeHtml(it.zh)}</td><td>${escapeHtml(it.en)}</td></tr>`
  ).join('') || '<tr><td colspan="2" class="muted">无匹配</td></tr>';
}
$('glossSearch').addEventListener('input', renderGloss);
$('tabSci').addEventListener('click', () => switchTab('sci'));
$('tabSiro').addEventListener('click', () => switchTab('siro'));
function switchTab(g) {
  curGenre = g;
  $('tabSci').classList.toggle('active', g==='sci');
  $('tabSiro').classList.toggle('active', g==='siro');
  renderGloss();
}

// ---- 添加术语 ----
$('addBtn').addEventListener('click', async () => {
  const zh = $('addZh').value.trim(), en = $('addEn').value.trim();
  const genre = $('addGenre').value, pw = $('addPw').value;
  const msg = $('addMsg');
  if (!zh || !en) { msg.innerHTML = '<span class="err">中文和英文都要填</span>'; return; }
  $('addBtn').disabled = true; msg.textContent = '添加中…';
  const r = await fetch(api('/api/glossary/add'), {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({zh, en, genre, password: pw})
  });
  $('addBtn').disabled = false;
  if (r.ok) {
    msg.innerHTML = `<span class="ok">已添加：${escapeHtml(zh)} → ${escapeHtml(en)}</span>`;
    $('addZh').value = ''; $('addEn').value = '';
    await loadGlossary();              // 自动刷新
    switchTab(genre);                  // 切到添加的分类,立即可见
  } else {
    const e = await r.json();
    msg.innerHTML = `<span class="err">${e.detail || '添加失败'}</span>`;
  }
});

loadGlossary();
</script>
</body>
</html>
